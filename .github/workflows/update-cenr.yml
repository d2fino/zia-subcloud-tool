name: Update CENR Cache

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch CENR data
        run: |
          curl -fsSL \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0" \
            -o cenr.json \
            https://config.zscaler.com/zscaler.net/cenr
      - name: Validate JSON
        run: python3 -c "import json; json.load(open('cenr.json')); print('OK')"
      - name: Commit if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add cenr.json
          git diff --staged --quiet || git commit -m "chore: update CENR cache $(date -u '+%Y-%m-%d')" && git push
